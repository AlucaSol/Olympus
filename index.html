<!DOCTYPE html>
<html lang="en" class="no-js">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Triarchs of Olympus — Three Empires. One Survivor.</title>
<meta name="description" content="Triarchs of Olympus is a three-player free-for-all MOBA fought across a symmetric triangular battlefield inspired by Ancient Greek myth. Join the battle for Olympus.">
<meta name="theme-color" content="#0d0e14">
<meta property="og:title" content="Triarchs of Olympus">
<meta property="og:description" content="A three-player free-for-all MOBA set in an original Ancient-Greece-inspired world. Three empires wage war for Olympus — the last standing acropolis wins.">
<meta property="og:type" content="website">
<meta property="og:image" content="./assets/images/concept-art-battlefield.png">
<link rel="icon" href="./assets/decorative/emblem.png" type="image/svg+xml">
<link rel="stylesheet" href="./css/site.css">
<link rel="stylesheet" href="./css/responsive.css">
</head>
<body>
<a class="skip-link" href="#enter-battle">Skip to Enter the Battle</a>

<main class="splash">
  <div class="splash-art" aria-hidden="true">
    <img src="./assets/images/concept-art-battlefield.png" alt="" loading="eager">
  </div>
  <div class="splash-columns" aria-hidden="true">
    <img src="./assets/decorative/columns.svg" alt="">
  </div>
  <div class="splash-vignette" aria-hidden="true"></div>
  <div class="atmosphere" data-embers="22" aria-hidden="true">
    <div class="cloud-layer"></div>
    <div class="lightning-flash"></div>
  </div>

  <div class="splash-content">
    <img class="splash-emblem" src="./assets/decorative/emblem.png" alt="" aria-hidden="true">
    <h1 class="game-title-lockup splash-title">
      TRIARCHS<span class="of">of</span>OLYMPUS
    </h1>
    <p class="splash-tagline">Three empires wage war. Only one can prevail.</p>

    <a id="enter-battle" class="btn btn-primary btn-lg enter-battle-btn" href="home.html">
      Join the Battle
    </a>
  </div>

  <div class="splash-scroll-hint" aria-hidden="true">The war has begun</div>
</main>
<script src="./js/site.js"></script>
</body>
</html>
