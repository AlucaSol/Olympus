<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 460" role="img" aria-labelledby="t d">
<title id="t">Stylised illustrated avatar of a 1990s teenage programmer reimagined in an Ancient Greek aesthetic</title>
<desc id="d">An artistic illustration, not a photograph: a young robed figure with a bronze laurel circlet sits at a marble desk before a beige CRT monitor glowing with green script, surrounded by clay-tablet floppy disks and unrolled scrolls of code.</desc>
<defs>
  <radialGradient id="aGlow" cx="50%" cy="30%" r="70%"><stop offset="0%" stop-color="#3a2f18"/><stop offset="100%" stop-color="#0d0e14"/></radialGradient>
  <linearGradient id="robe" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#e8dcc0"/><stop offset="100%" stop-color="#b8a878"/></linearGradient>
  <linearGradient id="desk" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#8a8378"/><stop offset="100%" stop-color="#4a4a52"/></linearGradient>
  <linearGradient id="monitor" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#d9cdb0"/><stop offset="100%" stop-color="#a89a72"/></linearGradient>
</defs>
<rect width="400" height="460" fill="url(#aGlow)"/>

<!-- marble desk -->
<rect x="20" y="360" width="360" height="26" rx="3" fill="url(#desk)"/>
<rect x="40" y="386" width="20" height="50" fill="#3a3a42"/>
<rect x="340" y="386" width="20" height="50" fill="#3a3a42"/>

<!-- CRT monitor (beige, 90s) -->
<g transform="translate(190,255)">
  <rect x="-70" y="-70" width="140" height="110" rx="10" fill="url(#monitor)" stroke="#6b6250" stroke-width="2"/>
  <rect x="-56" y="-56" width="112" height="78" rx="4" fill="#0e1a10"/>
  <g fill="#7fdc8a" opacity="0.9" font-family="monospace" font-size="9">
    <rect x="-48" y="-46" width="60" height="4"/>
    <rect x="-48" y="-36" width="88" height="4"/>
    <rect x="-48" y="-26" width="40" height="4"/>
    <rect x="-48" y="-16" width="72" height="4"/>
    <rect x="-48" y="-6" width="54" height="4"/>
  </g>
  <rect x="-14" y="40" width="28" height="14" fill="#8a8378"/>
  <rect x="-40" y="54" width="80" height="8" rx="2" fill="#6b6250"/>
</g>

<!-- keyboard -->
<rect x="140" y="330" width="120" height="16" rx="3" fill="#c9bfa0" stroke="#8a8378"/>

<!-- floppy disks styled as small clay tablets -->
<g fill="#b08a5a" stroke="#6b4f2e" stroke-width="1.5">
  <rect x="60" y="330" width="34" height="34" rx="3"/>
  <rect x="60" y="330" width="34" height="10" fill="#8a6a40"/>
</g>
<g fill="#9a7a52" stroke="#6b4f2e" stroke-width="1.5">
  <rect x="306" y="332" width="30" height="30" rx="3" transform="rotate(-8 321 347)"/>
</g>

<!-- scroll of code beside desk -->
<g transform="translate(70,300)">
  <rect x="-14" y="0" width="70" height="30" rx="4" fill="#e8dcc0"/>
  <circle cx="-14" cy="15" r="8" fill="#c9b890"/>
  <circle cx="56" cy="15" r="8" fill="#c9b890"/>
  <g stroke="#8a7a55" stroke-width="1.4">
    <line x1="0" y1="8" x2="40" y2="8"/><line x1="0" y1="15" x2="46" y2="15"/><line x1="0" y1="22" x2="30" y2="22"/>
  </g>
</g>

<!-- seated figure -->
<g>
  <!-- shoulders / chiton robe -->
  <path d="M130 320 Q190 260 250 320 L262 386 L118 386 Z" fill="url(#robe)"/>
  <path d="M150 320 L250 320 L242 386 L158 386 Z" fill="#cabf9f"/>
  <!-- bronze sash -->
  <path d="M150 330 L215 360" stroke="#c9822f" stroke-width="6" stroke-linecap="round"/>
  <!-- arms toward keyboard -->
  <path d="M158 330 Q170 350 178 340" fill="none" stroke="url(#robe)" stroke-width="16" stroke-linecap="round"/>
  <path d="M232 330 Q222 352 214 342" fill="none" stroke="url(#robe)" stroke-width="16" stroke-linecap="round"/>
  <!-- neck + head -->
  <rect x="176" y="248" width="28" height="34" rx="9" fill="#e0b37c"/>
  <ellipse cx="190" cy="228" rx="38" ry="42" fill="#e2bd93"/>
  <!-- youthful fringe -->
  <path d="M154 220 Q160 188 190 186 Q220 188 226 220 Q206 200 190 200 Q174 200 154 220Z" fill="#5a3a20"/>
  <!-- bronze laurel circlet -->
  <path d="M156 206 Q190 190 224 206" fill="none" stroke="#e8c66a" stroke-width="4" stroke-linecap="round"/>
  <g fill="#e8c66a">
    <ellipse cx="160" cy="204" rx="5" ry="3" transform="rotate(-30 160 204)"/>
    <ellipse cx="220" cy="204" rx="5" ry="3" transform="rotate(30 220 204)"/>
  </g>
</g>
</svg>
