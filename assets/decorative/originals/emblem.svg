<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-labelledby="emblemTitle">
  <title id="emblemTitle">Triarchs of Olympus emblem — three empires bound by a laurel crown</title>
  <defs>
    <radialGradient id="emblemGlow" cx="50%" cy="42%" r="60%">
      <stop offset="0%" stop-color="#fff2c8"/>
      <stop offset="45%" stop-color="#e8c66a"/>
      <stop offset="100%" stop-color="#6b5320"/>
    </radialGradient>
    <linearGradient id="emblemRing" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8c66a"/>
      <stop offset="100%" stop-color="#6b5320"/>
    </linearGradient>
  </defs>

  <circle cx="50" cy="50" r="47" fill="#0d0e14" stroke="url(#emblemRing)" stroke-width="2.5"/>
  <circle cx="50" cy="50" r="40" fill="none" stroke="#8a6a2e" stroke-width="1"/>

  <!-- three empire points -->
  <g opacity="0.92">
    <circle cx="50" cy="20" r="4.2" fill="#4a7edb"/>
    <circle cx="74" cy="63" r="4.2" fill="#d9705c"/>
    <circle cx="26" cy="63" r="4.2" fill="#63b556"/>
    <path d="M50 20L74 63L26 63Z" fill="none" stroke="#c9a44c" stroke-width="1.4" stroke-linejoin="round"/>
  </g>

  <!-- central lightning -->
  <path d="M53 32L42 52h8l-3 16 15-22h-8z" fill="url(#emblemGlow)"/>

  <!-- laurel wreath -->
  <g fill="none" stroke="#e8c66a" stroke-width="1.6" stroke-linecap="round" opacity="0.9">
    <path d="M20 58c-4 8-2 16 6 22"/>
    <path d="M80 58c4 8 2 16-6 22"/>
    <path d="M22 62l-4 1M21 66l-4.4.6M21.6 70.4l-4 1.4M23 74.4l-3.4 2"/>
    <path d="M78 62l4 1M79 66l4.4.6M78.4 70.4l4 1.4M77 74.4l3.4 2"/>
  </g>
</svg>
